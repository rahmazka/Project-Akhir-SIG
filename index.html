<html lang="id">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        input,
        button,

        }

        /* biar ikon Leaflet dan FontAwesome tidak rusak */

        .leaflet-control button {
            font-family: Arial, Helvetica, sans-serif !important;
        }

        .fas,
        .fa,
        .far,
        .fab {
            font-family: "Font Awesome 5 Free" !important;

        }

        html,

        #map {

        #searchInput {

        /* ===== TITLE CARD ===== */

<body>
    <div id="map"></div>

    <button id="customLayerBtn" onclick="toggleCustomLayer()"> 🗂️ Layer</button>

    <div class="location-buttons">
        <button id="nearestBtn" class="location-action-btn" onclick="findNearestFaskes()">📍 Terdekat</button>
        <button id="allRoutesBtn" class="location-action-btn" onclick="findAllRoutes()">🛣️ Semua Rute</button>
    </div>

    <div id="nearestPanel" class="nearest-panel">
        <div class="nearest-head">
            <span id="nearestPanelTitle">Faskes Terdekat</span>
            <button onclick="closeNearestPanel()">&times;</button>
        </div>
        <div id="nearestList" class="nearest-list"></div>
        <div id="routeInfo" class="route-note"></div>
    </div>


    <div class="search-panel">
        <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5"
                stroke-linecap="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="searchInput" type="text" placeholder="Cari nama, alamat, kecamatan..."
                oninput="doSearch(this.value)">
            <button id="clearBtn" onclick="clearSearch()">&times;</button>
        </div>
        <div id="searchResults"></div>
    </div>

    <div class="title-card">
        <h1>🐾 Peta Faskes Hewan</h1>
        <p>Kota Pekanbaru &middot; Provinsi Riau</p>
    </div>

    <div class="legend-card">
        <div class="leg-title">Legenda Titik</div>

            <span class="l-emoji">🏥</span>
            Rumah Sakit Hewan
        </div>

            <span class="l-emoji">🏩</span>
            Klinik Hewan
        </div>

        <div class="leg-row">
            <span class="l-emoji">🩺</span>

        </div>

        <div class="leg-row">

            Puskeswan
        </div>

        <div class="leg-row">
            <span class="l-emoji">🔬</span>
            UPT / Lab Veteriner

    <script src="js/qgis2web_expressions.js"></script>
    <script src="js/leaflet.js"></script>

    <script src="js/L.Control.Locate.min.js"></script>
    <script src="js/leaflet.rotatedMarker.js"></script>
    <script src="js/leaflet.pattern.js"></script>
    <script src="js/leaflet-hash.js"></script>
    <script src="js/Autolinker.min.js"></script>
    <script src="js/rbush.min.js"></script>
    <script src="js/labelgun.min.js"></script>
    <script src="js/labels.js"></script>
    <script src="js/leaflet.photon.js"></script>

    <!-- DATA: mengikuti nama layer dari kode pertama -->
    <script src="data/Dissolved_3.js"></script>
    <script src="data/Batas_Wilayah_KelurahanDesa_10K_AR_4.js"></script>
    <script src="data/JALAN_LN_50K_5.js"></script>
    <script src="data/JALAN_LN_50K_6.js"></script>
    <script src="data/datasig_7.js"></script>

    <script>
        var autolinker = new Autolinker({ truncate: { length: 30, location: 'smart' } });

        var map = L.map('map', {
            zoomControl: false,
            maxZoom: 19,
            minZoom: 1
        });

        new L.Hash(map);
        map.attributionControl.setPrefix('qgis2web &middot; Leaflet &middot; QGIS');
        L.control.zoom({ position: 'topleft' }).addTo(map);
        // L.control.locate({ locateOptions: { maxZoom: 19 } }).addTo(map);

        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            if (bounds_group.getLayers().length) {
                map.fitBounds(bounds_group.getBounds());
            }
        }

        // ===================== 3 BASEMAP DARI KODE PERTAMA =====================
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 100;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: 'OpenStreetMap',
            minZoom: 1,
            maxZoom: 19,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });

        map.createPane('pane_GoogleMaps_1');
        map.getPane('pane_GoogleMaps_1').style.zIndex = 100;
        var layer_GoogleMaps_1 = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleMaps_1',
            opacity: 1.0,
            attribution: 'Google Maps',
            minZoom: 1,
            maxZoom: 19,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });

        map.createPane('pane_BingVirtualEarth_2');
        map.getPane('pane_BingVirtualEarth_2').style.zIndex = 100;

        function tileToQuadKey(x, y, z) {
            var quadKey = '';
            for (var i = z; i > 0; i--) {
                var digit = 0;
                var mask = 1 << (i - 1);
                if ((x & mask) !== 0) digit += 1;
                if ((y & mask) !== 0) digit += 2;
                quadKey += digit.toString();
            }
            return quadKey;
        }

        var BingLayer = L.TileLayer.extend({
            getTileUrl: function (coords) {
                var quadKey = tileToQuadKey(coords.x, coords.y, coords.z);
                var subdomain = this._getSubdomain(coords);
                return 'https://ecn.t' + subdomain + '.tiles.virtualearth.net/tiles/a' + quadKey + '.jpeg?g=1&mkt=id-ID';
            }
        });

        var layer_BingVirtualEarth_2 = new BingLayer('', {
            pane: 'pane_BingVirtualEarth_2',
            opacity: 1.0,
            attribution: 'Bing Maps',
            minZoom: 1,
            maxZoom: 19,
            minNativeZoom: 1,
            maxNativeZoom: 19,
            subdomains: ['0', '1', '2', '3']
        });

        // Basemap default
        map.addLayer(layer_BingVirtualEarth_2);

        // ===================== LAYER BATAS KECAMATAN =====================
        map.createPane('pane_Dissolved_3');
        map.getPane('pane_Dissolved_3').style.zIndex = 401;
        map.getPane('pane_Dissolved_3').style['mix-blend-mode'] = 'normal';
        var layer_Dissolved_3 = new L.geoJson(json_Dissolved_3, {
            pane: 'pane_Dissolved_3',
            interactive: false,
            style: function () {
                return {
                    pane: 'pane_Dissolved_3',
                    color: 'rgba(255,255,255,0.7)',
                    weight: 2,
                    fill: true,
                    fillOpacity: 0.07,
                    fillColor: 'rgba(240,244,248,1)',
                    interactive: false
                };
            }
        });
        bounds_group.addLayer(layer_Dissolved_3);
        map.addLayer(layer_Dissolved_3);

        // ===================== LAYER BATAS KELURAHAN =====================
        map.createPane('pane_Batas_Wilayah_KelurahanDesa_10K_AR_4');
        map.getPane('pane_Batas_Wilayah_KelurahanDesa_10K_AR_4').style.zIndex = 402;
        map.getPane('pane_Batas_Wilayah_KelurahanDesa_10K_AR_4').style['mix-blend-mode'] = 'normal';
        var layer_Batas_Wilayah_KelurahanDesa_10K_AR_4 = new L.geoJson(json_Batas_Wilayah_KelurahanDesa_10K_AR_4, {

        function getBadge(t) {
            var m = {
                'Rumah Sakit Hewan': ['b-rsh', '🏥 Rumah Sakit Hewan'],
                'Klinik Hewan': ['b-kln', '🏨 Klinik Hewan'],
                'Praktek Dokter Hewan': ['b-prak', '👨‍⚕️ Praktek Dokter Hewan'],
                'Puskeswan': ['b-pusk', '🏛️ Puskeswan'],
                'UPT': ['b-upt', '🔬 UPT / Lab Veteriner']
            };
            return m[t] || ['b-def', t || 'Faskes Hewan'];
        }

        function getIkon(t) {
            return {
                'Rumah Sakit Hewan': '🏥',
                'Klinik Hewan': '🏨',
                'Praktek Dokter Hewan': '👨‍⚕️',
                'Puskeswan': '🏛️',
                'UPT': '🔬'
            }[t] || '🐾';
        }

        function gdriveToDirect(url) {
            if (!url) return '';
            url = String(url).trim();
            var match1 = url.match(/\/file\/d\/([^/]+)/);
            if (match1 && match1[1]) return 'https://drive.google.com/uc?export=view&id=' + match1[1];
            var match2 = url.match(/[?&]id=([^&]+)/);
            if (match2 && match2[1]) return 'https://drive.google.com/uc?export=view&id=' + match2[1];
            return url;
        }

        function buildPopup(feature) {
            var p = feature.properties;
            var tipe = p['TIPE'] || '';
            var nama = p['NAMA'] || '-';
            var almt = p['ALAMAT'] || '-';
            var kel = p['KELURAHAN'] || '-';
            var kec = p['KECAMATAN'] || '-';
            var foto = gdriveToDirect(p['FOTO']);

            var hasFoto = foto && foto !== 'null' && String(foto).trim() !== '';
            var fotoHtml = hasFoto
                ? '<img class="p-foto" src="' + String(foto).trim() + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
                + '<div class="p-nofoto" style="display:none">' + getIkon(tipe) + '</div>'
                : '<div class="p-nofoto">' + getIkon(tipe) + '</div>';

            var badge = getBadge(tipe);
            return '<div>' + fotoHtml
                + '<div class="p-body">'
                + '<span class="p-badge ' + badge[0] + '">' + badge[1] + '</span>'
                + '<div class="p-nama">' + nama + '</div>'
                + '<div class="p-alamat">' + almt + '</div>'
                + '<div class="p-loc">Kel. ' + kel + ' &middot; Kec. ' + kec + '</div>'
                + '<div class="p-div"></div>'
                + '<div class="p-row"><span class="p-lbl">Jenis Fasilitas</span><span class="p-val">' + tipe + '</span></div>'
                + '</div></div>';
        }

        function getEmoji(tipe) {
            var emoji = {
                'Rumah Sakit Hewan': '🏥',
                'Klinik Hewan': '🏩',
                'Praktek Dokter Hewan': '🩺',
                'Puskeswan': '🐾',
                'UPT': '🔬'
            };

            return emoji[tipe] || '📍';
        }

        function emojiMarker(feature, latlng) {
            var tipe = feature.properties['TIPE'];
            var icon = L.divIcon({
                className: 'emoji-marker',
                html: `<div>${getEmoji(tipe)}</div>`,
                iconSize: [34, 34],
                iconAnchor: [17, 17],
                popupAnchor: [0, -15]
            });

            return L.marker(latlng, { icon: icon });
        }

        // ===================== TITIK FASKES =====================
        map.createPane('pane_datasig_7');
        map.getPane('pane_datasig_7').style.zIndex = 405;
        map.getPane('pane_datasig_7').style['mix-blend-mode'] = 'normal';

        var layer_datasig_7 = new L.geoJson(json_datasig_7, {
            pane: 'pane_datasig_7',
            interactive: true,

            pointToLayer: function (feature, latlng) {
                var tipe = feature.properties['TIPE'] || '';

                var icon = L.divIcon({
                    className: 'emoji-marker',
                    html: '<div>' + getEmoji(tipe) + '</div>',
                    iconSize: [34, 34],
                    iconAnchor: [17, 17],
                    popupAnchor: [0, -15]
                });

                return L.marker(latlng, {
                    icon: icon,
                    pane: 'pane_datasig_7'
                });
            },

            onEachFeature: function (feature, layer) {
                layer.bindPopup(buildPopup(feature), {
                    maxWidth: 300,
                    minWidth: 280
                });

                layer.on('mouseover', function () {
                    var el = layer.getElement();
                    if (el) {
                        el.classList.add('emoji-marker-hover');
                    }
                });

                layer.on('mouseout', function () {
                    var el = layer.getElement();
                    if (el) {
                        el.classList.remove('emoji-marker-hover');
                    }
                });
            }
        });

        bounds_group.addLayer(layer_datasig_7);
        map.addLayer(layer_datasig_7);
        setBounds();

        // CONTROL LAYER: 3 BASEMAP + OVERLAY
        var baseMaps = {
            'Bing Satelit': layer_BingVirtualEarth_2,
            'Google Maps': layer_GoogleMaps_1,
            'OpenStreetMap': layer_OpenStreetMap_0
        };

        var overlayMaps = {
            'Titik Faskes Hewan': layer_datasig_7,
            'Jalan Utama': layer_JALAN_LN_50K_6,
            'Jalan Lokal': layer_JALAN_LN_50K_5,
            'Batas Kelurahan': layer_Batas_Wilayah_KelurahanDesa_10K_AR_4,
            'Batas Kecamatan': layer_Dissolved_3
        };

        var layerControl = L.control.layers(baseMaps, overlayMaps, {
            collapsed: false,
            position: 'bottomleft'
        }).addTo(map);

        document.querySelector('.leaflet-control-layers').classList.add('layer-hidden');

        function toggleCustomLayer() {
            var layerBox = document.querySelector('.leaflet-control-layers');
            layerBox.classList.toggle('layer-hidden');
        }

        // SEARCH
        var allMarkers = [];
        layer_datasig_7.eachLayer(function (l) {
            allMarkers.push(l);
        });


        // FITUR DETEKSI LOKASI, FASKES TERDEKAT, DAN RUTE
        var userLocationMarker = null;
        var userLatLngGlobal = null;
        var nearestResults = [];
        var routeLayers = [];
        var currentRouteMode = 'nearest'; // nearest atau all

        function formatDistance(meter) {
            if (meter < 1000) {
                return Math.round(meter) + ' m';
            }
            return (meter / 1000).toFixed(2).replace('.', ',') + ' km';
        }

        function formatDuration(second) {
            var menit = Math.max(1, Math.round(second / 60));
            if (menit < 60) {
                return menit + ' menit';
            }

            var jam = Math.floor(menit / 60);
            var sisaMenit = menit % 60;
            return jam + ' jam ' + (sisaMenit > 0 ? sisaMenit + ' menit' : '');
        }

        function showRouteInfo(text) {
            var routeInfo = document.getElementById('routeInfo');
            routeInfo.innerHTML = text;
            routeInfo.style.display = 'block';
        }

        function hideRouteInfo() {
            var routeInfo = document.getElementById('routeInfo');
            routeInfo.innerHTML = '';
            routeInfo.style.display = 'none';
        }

        function clearRoutes() {
            routeLayers.forEach(function (layer) {
                if (map.hasLayer(layer)) {
                    map.removeLayer(layer);
                }
            });

            routeLayers = [];
        }

        function setUserLocationMarker(latlng) {
            userLatLngGlobal = latlng;

            if (userLocationMarker) {
                map.removeLayer(userLocationMarker);
            }

            userLocationMarker = L.marker(latlng, {
                icon: L.divIcon({
                    className: 'user-location-marker',
                    iconSize: [18, 18],
                    iconAnchor: [9, 9]
                })
            }).addTo(map);

            userLocationMarker.bindPopup('<b>Lokasi Anda saat ini</b>');
        }

        function openGoogleMapsRoute(destLat, destLng) {
            if (!userLatLngGlobal) return;

            var url = 'https://www.google.com/maps/dir/?api=1'
                + '&origin=' + userLatLngGlobal.lat + ',' + userLatLngGlobal.lng
                + '&destination=' + destLat + ',' + destLng
                + '&travelmode=driving';

            window.open(url, '_blank');
        }

        function getCurrentLocation(callback) {
            var list = document.getElementById('nearestList');
            var panel = document.getElementById('nearestPanel');

            panel.style.display = 'block';
            list.innerHTML = '<div class="s-empty">Mendeteksi lokasi Anda...</div>';
            hideRouteInfo();

            if (!navigator.geolocation) {
                list.innerHTML = '<div class="s-empty">Browser tidak mendukung deteksi lokasi.</div>';
                return;
            }

            navigator.geolocation.getCurrentPosition(function (pos) {
                var userLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
                setUserLocationMarker(userLatLng);

                nearestResults = allMarkers
                    .filter(function (marker) {
                        return marker && typeof marker.getLatLng === 'function';
                    })
                    .map(function (marker) {
                        return {
                            layer: marker,
                            distance: map.distance(userLatLng, marker.getLatLng())
                        };
                    })
                    .sort(function (a, b) {
                        return a.distance - b.distance;
                    });

                callback(userLatLng, nearestResults);
            }, function (err) {
                var msg = 'Lokasi tidak bisa diakses.';
                if (err.code === 1) msg = 'Izin lokasi ditolak. Aktifkan permission lokasi di browser.';
                if (err.code === 2) msg = 'Lokasi tidak tersedia. Coba aktifkan GPS atau WiFi.';
                if (err.code === 3) msg = 'Waktu deteksi lokasi habis. Coba ulangi lagi.';

                list.innerHTML = '<div class="s-empty">' + msg + '</div>';
            }, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        }

        function routeUrl(userLatLng, targetLatLng) {
            return 'https://router.project-osrm.org/route/v1/driving/'
                + userLatLng.lng + ',' + userLatLng.lat + ';'
                + targetLatLng.lng + ',' + targetLatLng.lat
                + '?overview=full&geometries=geojson&steps=false';
        }

        function createFallbackLine(userLatLng, targetLatLng, options) {
            var line = L.polyline([userLatLng, targetLatLng], {
                color: options.color || '#2563eb',
                weight: options.weight || 3,
                opacity: options.opacity || 0.75,
                dashArray: options.dashArray || '7, 7'
            }).addTo(map);

            routeLayers.push(line);
            return line;
        }

        function drawSingleRoute(userLatLng, item) {
            if (!item) return;

            clearRoutes();
            hideRouteInfo();

            var targetLatLng = item.layer.getLatLng();
            var p = item.layer.feature.properties;
            var straightLine = createFallbackLine(userLatLng, targetLatLng, {
                color: '#2563eb',
                weight: 3,
                opacity: 0.75,
                dashArray: '7, 7'
            });

            showRouteInfo('Mencari rute jalan ke <b>' + (p['NAMA'] || 'faskes') + '</b>...');

            fetch(routeUrl(userLatLng, targetLatLng))
                .then(function (res) {
                    if (!res.ok) throw new Error('Gagal mengambil rute');
                    return res.json();
                })
                .then(function (data) {
                    if (!data.routes || !data.routes.length) {
                        throw new Error('Rute tidak ditemukan');
                    }

                    if (map.hasLayer(straightLine)) {
                        map.removeLayer(straightLine);
                    }

                    routeLayers = routeLayers.filter(function (layer) {
                        return layer !== straightLine;
                    });

                    var route = data.routes[0];
                    var coords = route.geometry.coordinates.map(function (c) {
                        return [c[1], c[0]];
                    });

                    var routeLine = L.polyline(coords, {
                        color: '#16a34a',
                        weight: 5,
                        opacity: 0.9
                    }).addTo(map);

                    routeLayers.push(routeLine);

                    showRouteInfo(
                        'Rute ke <b>' + (p['NAMA'] || '-') + '</b><br>'
                        + 'Jarak rute: <b>' + formatDistance(route.distance) + '</b> · estimasi <b>' + formatDuration(route.duration) + '</b><br>'
                        + '<a href="#" class="route-link" onclick="openGoogleMapsRoute(' + targetLatLng.lat + ',' + targetLatLng.lng + '); return false;">Buka rute di Google Maps</a>'
                    );

                    map.fitBounds(routeLine.getBounds(), {
                        padding: [55, 55]
                    });
                })
                .catch(function () {
                    showRouteInfo(
                        'Rute jalan belum bisa dimuat, jadi ditampilkan garis lurus perkiraan ke <b>' + (p['NAMA'] || '-') + '</b>.<br>'
                        + '<a href="#" class="route-link" onclick="openGoogleMapsRoute(' + targetLatLng.lat + ',' + targetLatLng.lng + '); return false;">Buka rute di Google Maps</a>'
                    );

                    map.fitBounds(L.latLngBounds([userLatLng, targetLatLng]), {
                        padding: [55, 55]
                    });
                });

            if (!map.hasLayer(layer_datasig_7)) {
                map.addLayer(layer_datasig_7);
            }

            setTimeout(function () {
                item.layer.openPopup();
            }, 300);
        }

        function drawAllRoutes(userLatLng, results) {
            clearRoutes();
            hideRouteInfo();

            if (!results.length) {
                showRouteInfo('Marker faskes tidak ditemukan.');
                return;
            }

            showRouteInfo('Membuat rute ke semua faskes...');

            var bounds = L.latLngBounds([userLatLng]);
            results.forEach(function (item) {
                bounds.extend(item.layer.getLatLng());
            });

            var completed = 0;
            var success = 0;
            var maxRoutes = results.length;

            results.forEach(function (item) {
                var targetLatLng = item.layer.getLatLng();

                fetch(routeUrl(userLatLng, targetLatLng))
                    .then(function (res) {
                        if (!res.ok) throw new Error('Gagal mengambil rute');
                        return res.json();
                    })
                    .then(function (data) {
                        if (!data.routes || !data.routes.length) {
                            throw new Error('Rute tidak ditemukan');
                        }

                        var coords = data.routes[0].geometry.coordinates.map(function (c) {
                            return [c[1], c[0]];
                        });

                        var line = L.polyline(coords, {
                            color: '#16a34a',
                            weight: 3,
                            opacity: 0.45
                        }).addTo(map);

                        routeLayers.push(line);
                        success++;
                    })
                    .catch(function () {
                        var fallback = createFallbackLine(userLatLng, targetLatLng, {
                            color: '#2563eb',
                            weight: 2,
                            opacity: 0.35,
                            dashArray: '6, 6'
                        });

                        routeLayers.push(fallback);
                    })
                    .finally(function () {
                        completed++;
                        showRouteInfo(
                            'Memuat rute: <b>' + completed + '/' + maxRoutes + '</b> selesai.<br>'
                            + 'Rute hijau = rute jalan, garis biru putus-putus = perkiraan garis lurus.<br>'
                            + 'Klik salah satu faskes di daftar untuk fokus ke satu rute saja.'
                        );
                    });
            });

            map.fitBounds(bounds, {
                padding: [55, 55]
            });
        }

        function showNearestList(results) {
            var list = document.getElementById('nearestList');
            var panel = document.getElementById('nearestPanel');
            var title = document.getElementById('nearestPanelTitle');

            title.innerHTML = 'Faskes Terdekat';

            if (!results.length) {
                list.innerHTML = '<div class="s-empty">Marker faskes tidak ditemukan</div>';
                panel.style.display = 'block';
                return;
            }

            list.innerHTML = results.slice(0, 5).map(function (item, i) {
                var p = item.layer.feature.properties;
                return '<div class="nearest-item" onclick="focusRoute(' + i + ')">'
                    + '<div class="nearest-name">' + (i + 1) + '. ' + (p['NAMA'] || '-') + '</div>'
                    + '<div class="nearest-sub">' + (p['TIPE'] || '') + ' &middot; Kec. ' + (p['KECAMATAN'] || '') + '</div>'
                    + '<span class="nearest-distance">' + formatDistance(item.distance) + ' · lihat rute</span>'
                    + '</div>';
            }).join('');

            panel.style.display = 'block';
        }

        function showAllRoutesList(results) {
            var list = document.getElementById('nearestList');
            var panel = document.getElementById('nearestPanel');
            var title = document.getElementById('nearestPanelTitle');

            title.innerHTML = 'Semua Rute Faskes';

            if (!results.length) {
                list.innerHTML = '<div class="s-empty">Marker faskes tidak ditemukan</div>';
                panel.style.display = 'block';
                return;
            }

            list.innerHTML = results.map(function (item, i) {
                var p = item.layer.feature.properties;
                return '<div class="nearest-item" onclick="focusRoute(' + i + ')">'
                    + '<div class="nearest-name">' + (i + 1) + '. ' + (p['NAMA'] || '-') + '</div>'
                    + '<div class="nearest-sub">' + (p['TIPE'] || '') + ' &middot; Kec. ' + (p['KECAMATAN'] || '') + '</div>'
                    + '<span class="nearest-distance">' + formatDistance(item.distance) + ' · klik fokus rute</span>'
                    + '</div>';
            }).join('');

            panel.style.display = 'block';
        }

        function focusRoute(index) {
            var item = nearestResults[index];
            if (!item || !userLatLngGlobal) return;

            drawSingleRoute(userLatLngGlobal, item);
        }

        function closeNearestPanel() {
            document.getElementById('nearestPanel').style.display = 'none';
        }

        function findNearestFaskes() {
            currentRouteMode = 'nearest';

            getCurrentLocation(function (userLatLng, results) {
                showNearestList(results);

                if (results.length > 0) {
                    drawSingleRoute(userLatLng, results[0]);
                }
            });
        }

        function findAllRoutes() {
            currentRouteMode = 'all';

            getCurrentLocation(function (userLatLng, results) {
                showAllRoutesList(results);
                drawAllRoutes(userLatLng, results);
            });
        }

        function doSearch(val) {
            var box = document.getElementById('searchResults');
            if (!val || val.length < 2) {
                box.style.display = 'none';
                return;
            }

            var q = val.toLowerCase();
            var hits = allMarkers.filter(function (l) {
                var p = l.feature.properties;
                return (p['NAMA'] || '').toLowerCase().includes(q)
                    || (p['ALAMAT'] || '').toLowerCase().includes(q)
                    || (p['KECAMATAN'] || '').toLowerCase().includes(q)
                    || (p['KELURAHAN'] || '').toLowerCase().includes(q)
                    || (p['TIPE'] || '').toLowerCase().includes(q);
            });

            box.innerHTML = hits.length === 0
                ? '<div class="s-empty">Tidak ditemukan</div>'
                : hits.slice(0, 10).map(function (l) {
                    var p = l.feature.properties;
                    var idx = allMarkers.indexOf(l);
                    return '<div class="s-item" onclick="goTo(' + idx + ')">'
                        + '<div class="s-name">' + (p['NAMA'] || '-') + '</div>'
                        + '<div class="s-sub">' + (p['TIPE'] || '') + ' &middot; Kec. ' + (p['KECAMATAN'] || '') + '</div>'
                        + '</div>';
                }).join('');

            box.style.display = 'block';
        }

        function goTo(idx) {
            var l = allMarkers[idx];
            if (!l) return;
            if (!map.hasLayer(layer_datasig_7)) map.addLayer(layer_datasig_7);
            map.setView(l.getLatLng(), 17);
            setTimeout(function () {
                l.openPopup();
            }, 300);
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('searchInput').value = l.feature.properties['NAMA'] || '';
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').style.display = 'none';
        }

        document.addEventListener('click', function (e) {
            if (!e.target.closest('.search-panel')) {
                document.getElementById('searchResults').style.display = 'none';
            }
        });
    </script>
